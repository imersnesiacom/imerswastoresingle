<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Panel Admin</title>
    <link id="dynamicFavicon" rel="icon" href="https://imersnesia.com/wp-content/uploads/2026/06/iconjualanplus.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <script>
        try {
            if (localStorage.getItem('iMersWA_User')) {
                if (window.location.protocol !== 'blob:' && window.location.protocol !== 'data:' && window.self === window.top) {
                    window.location.href = 'dashboard.html';
                }
            }
        } catch (e) { console.error("Error cek sesi:", e); }
    </script>

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden relative">
        <a href="index.html" class="absolute top-4 left-4 text-slate-400 hover:text-slate-600 flex items-center gap-1 text-sm font-medium transition-colors cursor-pointer z-10">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Toko
        </a>

        <div class="p-8 pt-14">
            <div class="text-center mb-8">
                <div id="brandLogoContainer" class="w-16 h-16 rounded-2xl bg-emerald-50 border border-emerald-100 flex items-center justify-center mx-auto mb-4 overflow-hidden shadow-sm">
                    <i data-lucide="store" class="w-8 h-8 text-emerald-500" id="defaultLogo"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-900" id="formTitle">Masuk ke Toko</h2>
                <p class="text-slate-500 text-sm mt-1">Silakan masuk menggunakan akun Admin/Kasir</p>
            </div>

            <div id="alertBox" class="hidden mb-6 p-3 rounded-lg text-sm font-medium text-center"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="Masukkan username">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium text-slate-700">Password</label>
                        <button type="button" onclick="toggleForm('forgot')" class="text-xs text-emerald-600 hover:text-emerald-700 font-medium transition-colors">Lupa password?</button>
                    </div>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="••••••••">
                </div>
                <button type="submit" id="btnLogin" class="w-full flex justify-center items-center py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-emerald-500 hover:bg-emerald-600 focus:ring-4 focus:ring-emerald-100 transition-all shadow-lg shadow-emerald-500/30">
                    <span id="btnLoginText">Masuk Sekarang</span>
                    <i data-lucide="loader-2" id="btnLoginLoader" class="w-5 h-5 ml-2 animate-spin hidden"></i>
                </button>
            </form>

            <form id="forgotForm" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email atau No WhatsApp</label>
                    <input type="text" id="resetTarget" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="email / 628123...">
                    <p class="text-[10px] text-slate-500 mt-1">Sistem akan mengirimkan password baru ke kontak Anda.</p>
                </div>
                <button type="submit" id="btnForgot" class="w-full flex justify-center items-center py-3.5 px-4 rounded-xl text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 transition-all shadow-md">
                    <span id="btnForgotText">Reset & Kirim Password</span>
                    <i data-lucide="loader-2" id="btnForgotLoader" class="w-5 h-5 ml-2 animate-spin hidden"></i>
                </button>
                <div class="text-center">
                    <button type="button" onclick="toggleForm('login')" class="text-sm text-slate-500 hover:text-slate-700 font-medium transition-colors">&larr; Kembali ke Login</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // UBAH URL INI DENGAN DEPLOY APP SCRIPT ANDA
        var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby4ESiS1p72T03EOLfjlcrybMeC10SjwfOywcZXF-6yvMyaIjrhUPXDGA-uo59Un_LS/exec';

        // Load Identitas Toko (Single Store)
        document.addEventListener('DOMContentLoaded', () => {
            let fd = new FormData();
            fd.append('action', 'get_store_catalog');
            
            fetch(SCRIPT_URL, { method: 'POST', body: fd })
                .then(res => res.json())
                .then(res => {
                    if (res.success && res.store) {
                        document.title = `Masuk - ${res.store.nama_toko}`;
                        document.getElementById('formTitle').innerText = `Masuk ke ${res.store.nama_toko}`;
                        
                        if (res.store.logo) {
                            const logoContainer = document.getElementById('brandLogoContainer');
                            logoContainer.innerHTML = `<img src="${res.store.logo}" class="w-full h-full object-cover">`;
                            logoContainer.classList.replace('bg-emerald-50', 'bg-white');
                            logoContainer.classList.replace('border-emerald-100', 'border-slate-200');
                            const favicon = document.getElementById('dynamicFavicon');
                            if(favicon) favicon.href = res.store.logo;
                        }
                    }
                }).catch(err => console.error(err));
        });

        function toggleForm(type) {
            const loginForm = document.getElementById('loginForm');
            const forgotForm = document.getElementById('forgotForm');
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.add('hidden'); 
            
            if (type === 'forgot') {
                loginForm.classList.add('hidden');
                forgotForm.classList.remove('hidden');
                document.getElementById('formTitle').innerText = "Lupa Password";
            } else {
                forgotForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                document.getElementById('formTitle').innerText = "Masuk ke Toko";
            }
        }

        function showAlert(msg, isSuccess) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = msg;
            alertBox.className = `mb-6 p-3 rounded-lg text-sm font-bold text-center ${isSuccess ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'}`;
            alertBox.classList.remove('hidden');
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnText = document.getElementById('btnLoginText');
            const btnLoader = document.getElementById('btnLoginLoader');
            const btnLogin = document.getElementById('btnLogin');
            
            btnLogin.disabled = true;
            btnText.innerText = "Memverifikasi...";
            btnLoader.classList.remove('hidden');
            document.getElementById('alertBox').classList.add('hidden');
            
            const fd = new FormData();
            fd.append('action', 'login');
            fd.append('username', document.getElementById('username').value);
            fd.append('password', document.getElementById('password').value);

            fetch(SCRIPT_URL, { method: 'POST', body: fd })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        showAlert(res.message, true);
                        localStorage.setItem('iMersWA_User', JSON.stringify(res.data));
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                    } else {
                        showAlert(res.message, false);
                        btnLogin.disabled = false;
                        btnText.innerText = "Masuk Sekarang";
                        btnLoader.classList.add('hidden');
                    }
                }).catch(err => {
                    showAlert("Terjadi kesalahan koneksi.", false);
                    btnLogin.disabled = false;
                    btnText.innerText = "Masuk Sekarang";
                    btnLoader.classList.add('hidden');
                });
        });

        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnText = document.getElementById('btnForgotText');
            const btnLoader = document.getElementById('btnForgotLoader');
            const btnForgot = document.getElementById('btnForgot');
            
            btnForgot.disabled = true;
            btnText.innerText = "Memproses...";
            btnLoader.classList.remove('hidden');
            
            const fd = new FormData();
            fd.append('action', 'forgot_password');
            fd.append('email_or_wa', document.getElementById('resetTarget').value);

            fetch(SCRIPT_URL, { method: 'POST', body: fd })
                .then(res => res.json())
                .then(res => {
                    showAlert(res.message, res.success);
                    btnForgot.disabled = false;
                    btnText.innerText = "Reset & Kirim Password";
                    btnLoader.classList.add('hidden');
                    if(res.success) {
                        document.getElementById('forgotForm').reset();
                        setTimeout(() => toggleForm('login'), 3000);
                    }
                }).catch(err => {
                    showAlert("Terjadi kesalahan koneksi", false);
                    btnForgot.disabled = false;
                    btnText.innerText = "Reset & Kirim Password";
                    btnLoader.classList.add('hidden');
                });
        });
    </script>
</body>
</html>
